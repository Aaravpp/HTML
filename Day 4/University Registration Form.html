<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form action="">
        <h1>University Registration Form</h1>
        <p>Please fill out the form below to register.</p>

        <hr>

        <h2>Personal Details</h2>

        <label for="fname">First Name:</label>
        <input type="text" name="First Name" id="fname" placeholder="e.g: Abcdf" required>
        <br><br>

        <label for="surename">Last Name:</label>
        <input type="text" name="Last Name" id="surename" placeholder="e.g: Kumar">
        <br><br>

        <label for="dob">Date of Birth</label>
        <input type="date" name="DOB" id="dob" required>
        <br><br>

        <label for="gender">Gender:</label><br>
        <input type="radio" name="Gender" id="male" value="Male">
        <label for="male">Male</label>
        <br>
        <input type="radio" name="Gender" id="female" value="Female">
        <label for="female">Female</label>
        <br>
        <input type="radio" name="Gender" id="other" value="Other">
        <label for="other">Other</label>
        <br><br>

        <label for="file">Upload Your Photo:</label><br>
        <input type="file" name="Photo" id="file">

        <hr>
        
        <h2>Contact Information</h2>

        <label for="email">Email Address:</label>
        <input type="email" name="Email" id="email" placeholder="you@example.com">
        <br><br>

        <label for="phone">Phone Number:</label>
        <input type="tel" name="Phone" id="phone" placeholder="e.g: 9826842695">
        <br><br>

        <label for="Address">Mailing Address:</label><br>
        <textarea name="Address" id="Address" rows="6" cols="30" placeholder="Street Address, city, state, ZIP Code"></textarea>

        <hr>

        <h2>Academic Information</h2>

        <label for="course">Select Your Course:</label><br>
        <select name="Course" id="course">
            <option value="" disabled selected>--Choose a course--</option>
            <option value="Computer Science & Engineering(CSE)">Computer Science & Engineering(CSE)</option>
            <option value="Mechanical Engineering">Mechanical Engineering</option>
            <option value="Electronics & Communication">Electronics & Communication(ECE)</option>
            <option value="Electrical Engineering">Electrical Engineering</option>
            <option value="Civil Engineering">Civil Engineering</option>
            <option value="Information Engineering">Information Engineering(IT)</option>
        </select>

        <br><br>

        <label>Etracurricular interests:</label><br>
        <input type="checkbox" name="Etracurricular interests" id="Sports" value="Sports">
        <label for="Sports">Sports</label>
        <br>

        <input type="checkbox" name="Etracurricular interests" id="Music & Arts" value="Music & Arts">
        <label for="Music & Arts">Music & Arts</label>
        <br>

        <input type="checkbox" name="Etracurricular interests" id="Technology Clubs" value="Technology Clubs">
        <label for="Technology Clubs">Technology Clubs</label>
        <br>

        <input type="checkbox" name="Etracurricular interests" id="Volunteering" value="Volunteering">
        <label for="Volunteering">Volunteering</label>
        <br>

        <hr>

        <h2>Create Your Account</h2>

        <label for="pass">Create a Password:</label>
        <input type="password" name="Userpassword" id="pass">
        <br><br>

        <label for="security qus">Security Question:</label>
        <select name="Security Question" id="security qus">
            <option value="">What was the name of your best childhood friend's pet?</option>
            <option value="">What is your oldest sibling's middle name?</option>
            <option value="">In what city or town did your parents meet?</option>
            <option value="">What was the make and model of your first car?</option>
        </select>
        <br><br>

        <label for="security ans">Security Answer:</label>
        <input type="text" name="Security" id="security ans">
        <br><br>

        <input type="checkbox" name="terms and condition agree" id="terms and condition">
        <label for="terms and condition">I agree to the terms and Conditions.</label>    

        <hr>

        <button type="submit">Register</button>
        <button type="reset">Clear Form</button>
    </form>

</body>
</html>
